name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate before packaging
        run: |
          python3 tools/validate.py
          python3 -m py_compile hameshabetz/skills/hameshabetz/scripts/*.py

      - name: Verify tag matches VERSION
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          file="$(cat VERSION)"
          echo "tag=$tag VERSION=$file"
          test "$tag" = "$file" || { echo "::error::tag v$tag does not match VERSION ($file)"; exit 1; }

      - name: Package plugin
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          # Plugin-only archive (what users install from the marketplace).
          zip -r "hameshabetz-${version}.zip" hameshabetz -x '*/__pycache__/*'
          # Bare-skill archive (SKILL.md at the archive root) for ChatGPT /
          # Manus / Agent-Skills uploads, which expect the skill folder itself.
          ( cd hameshabetz/skills && \
            zip -r "${GITHUB_WORKSPACE}/hameshabetz-skill-${version}.zip" hameshabetz -x '*/__pycache__/*' )
          # Stable, unversioned alias so a /releases/latest/download/hameshabetz-skill.zip
          # link always resolves (used by the landing page's direct-download button).
          cp "hameshabetz-skill-${version}.zip" "hameshabetz-skill.zip"
          # Full marketplace archive (all universal-repo formats).
          zip -r "bina-lamora-${version}.zip" \
            .claude-plugin .cursor-plugin .agents hameshabetz \
            README.md LICENSE CHANGELOG.md VERSION VERSIONING.md \
            -x '*/__pycache__/*'
          ls -la ./*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: בינה־למורה ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            hameshabetz-*.zip
            hameshabetz-skill-*.zip
            hameshabetz-skill.zip
            bina-lamora-*.zip
