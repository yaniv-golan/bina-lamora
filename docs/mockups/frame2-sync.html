<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="style.css"></head>
<body><div class="stage"><div class="dialog" style="position:relative">

  <div style="display:flex;align-items:center;justify-content:space-between">
    <h2>Add marketplace</h2>
    <div class="iconbtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
  </div>

  <div class="warn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex:none;margin-top:1px"><path d="M12 3l9 16H3zM12 10v4M12 17v.5"/></svg>
    <div>Make sure you trust a plugin before installing, updating, or using it. Plugins installed from marketplaces are not controlled by Anthropic.</div>
  </div>

  <div class="field">
    <label>URL</label>
    <div class="input" style="position:relative">
      <span class="code">yaniv-golan/claude-lamora</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      <span class="ring" style="inset:-4px"></span><span class="badge" style="top:-15px;left:-11px">3</span>
    </div>
    <div class="hint">A GitHub <code>owner/repo</code> or a git repository URL.</div>
  </div>

  <div class="foot">
    <div class="btn">Cancel</div>
    <div class="btn dark" style="position:relative">Sync
      <span class="ring" style="inset:-5px"></span><span class="badge" style="top:-15px;right:-11px">4</span>
    </div>
  </div>
</div></div></body></html>
