<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:linear-gradient(135deg,#faf6f0 0%,#f6ece2 100%);
    font-family:"Heebo","Assistant",ui-sans-serif,-apple-system,"Segoe UI",Arial,sans-serif;
    color:#241f1a; display:flex; flex-direction:column; justify-content:center;
    padding:72px 80px; position:relative;
  }
  .brand{font-size:34px; font-weight:800; color:#b5623f; margin-bottom:26px}
  .brand .em{font-size:38px}
  h1{font-size:70px; font-weight:800; line-height:1.12; letter-spacing:-.01em; max-width:1000px}
  h1 .accent{color:#b5623f}
  p{font-size:30px; color:#4f4941; margin-top:26px; line-height:1.5; max-width:980px}
  .foot{position:absolute; bottom:56px; right:80px; font-size:22px; color:#8a8177}
  .chip{position:absolute; bottom:52px; left:80px; display:flex; gap:12px}
  .chip span{background:#fff; border:1px solid #ece5db; border-radius:999px; padding:10px 20px; font-size:22px; font-weight:700; color:#3d3d3d}
</style></head>
<body>
  <div class="brand"><span class="em">👩‍🏫</span> קלוד־למורה</div>
  <h1>שיבוץ שכבה לכיתות — <span class="accent">בשעה, לא ביומיים</span></h1>
  <p>המשבץ הופך את טופס בחירת החברים.ות לחלוקה מאוזנת לכיתות. בעברית, בלי להתקין כלום.</p>
  <div class="chip"><span>Claude</span><span>ChatGPT</span></div>
  <div class="foot">כלי קוד־פתוח למורות ולצוותי חינוך בישראל</div>
</body></html>
