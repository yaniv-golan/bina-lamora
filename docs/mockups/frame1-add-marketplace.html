<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="style.css"></head>
<body><div class="stage"><div class="modal">

  <aside class="side">
    <div class="grp">Settings</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg>General</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5"/></svg>Account</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Usage</div>
    <div class="grp">Customize</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><path d="M8 9h8M8 13h5"/></svg>Skills</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="4" width="7" height="7" rx="1.6"/><rect x="13" y="4" width="7" height="7" rx="1.6"/><rect x="4" y="13" width="7" height="7" rx="1.6"/></svg>Connectors</div>
    <div class="nav on"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 3v5M15 3v5M6 8h12v3a6 6 0 0 1-12 0zM12 17v4"/></svg>Plugins</div>
  </aside>

  <section class="main">
    <div class="head">
      <h1>Plugins</h1>
      <div class="actions">
        <div class="iconbtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg></div>
        <div class="btn">Browse</div>
        <div class="btn" style="position:relative;z-index:6">Add
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          <span class="ring" style="inset:-5px"></span><span class="badge" style="top:-15px;right:-11px">1</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab on">All</div><div class="tab">Personal</div><div class="tab">Organization</div>
    </div>

    <div style="display:grid;place-items:center;height:330px;color:var(--faint);font-size:14.5px;text-align:center;line-height:1.7">
      <div><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="opacity:.5"><path d="M9 3v5M15 3v5M6 8h12v3a6 6 0 0 1-12 0zM12 17v4"/></svg>
      <div style="margin-top:12px">No plugins yet.<br>Click <b style="color:var(--muted)">Add</b> to get started.</div></div>
    </div>

    <!-- open dropdown -->
    <div class="menu">
      <div class="item hl" style="position:relative"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 9h18M3 9l2-4h14l2 4M5 9v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9M9 13h6"/></svg>Add marketplace
        <span class="ring" style="inset:-3px"></span><span class="badge" style="top:-13px;right:-9px">2</span>
      </div>
      <div class="item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 16V5M8 9l4-4 4 4M5 19h14"/></svg>Upload plugin</div>
      <div class="item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12a8 8 0 1 1-3.2-6.4M20 5v4h-4"/></svg>Create with Claude</div>
    </div>
  </section>

</div></div></body></html>
